# Project-local ai-commit config (overrides ~/.ai-commit.yaml for this repo).
# Requires ai-commit >= v0.1.45 for commit.ai_footer.

api:
  model: ai-commit
  timeout: 120s

commit:
  language: en
  body_mode: auto
  manual_ai_mode: off
  ai_footer: off
  template: "{type}({scope}): {subject}"
  context: ""
  triggers: []

ui:
  spinner: auto
  hook_spinner: off